<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Carte sémantique</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:    #2a1f14;
    --bg2:   #1e1509;
    --panel: #3a2a18;
    --panel2:#4a3520;
    --gold:  #c9a94b;
    --gold2: #e8c870;
    --ink:   #f5e8d0;
    --ink2:  #d4c4a0;
    --ink3:  #a08060;
    --shadow:rgba(0,0,0,0.7);
    --glow:  rgba(201,169,75,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Crimson Pro', Georgia, serif;
    overflow: hidden;
    width: 100vw; height: 100vh;
    cursor: grab;
  }
  body.grabbing { cursor: grabbing; }

  /* ── Header ── */
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 14px 28px;
    background: linear-gradient(to bottom, var(--bg2) 80%, transparent);
    pointer-events: none;
  }
  #header-center { text-align: center; }
  #header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem; font-weight: 700; letter-spacing: .08em;
    color: var(--gold2);
    text-shadow: 0 2px 12px rgba(201,169,75,.5);
  }
  #header p {
    font-size: .8rem; color: var(--ink3); font-style: italic;
    letter-spacing: .04em;
  }
  #bookcount {
    position: fixed; top: 18px; right: 20px;
    font-size: .78rem; color: var(--ink3); z-index: 101;
    pointer-events: none;
  }

  /* ── Loading overlay ── */
  #loading {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg2);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px;
    transition: opacity .6s ease;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  #loading .spinner {
    width: 54px; height: 54px;
    border: 3px solid var(--panel2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading .load-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem; color: var(--gold); letter-spacing: .1em;
  }
  #loading .load-sub {
    font-size: .85rem; color: var(--ink3); font-style: italic;
  }

  /* ── Canvas ── */
  #map-canvas { position: fixed; inset: 0; display: block; }

  /* ── Popup ── */
  #popup {
    position: fixed; z-index: 200;
    width: 310px; max-width: calc(100vw - 32px);
    background: linear-gradient(145deg, #3e2c1a, #2c1e0f);
    border: 1px solid var(--gold);
    border-radius: 14px;
    box-shadow: 0 8px 40px rgba(0,0,0,.75), 0 0 0 1px rgba(201,169,75,.12), inset 0 1px 0 rgba(255,255,255,.05);
    padding: 20px 22px 18px;
    display: none;
    pointer-events: all;
    animation: popup-in .2s cubic-bezier(.22,1,.36,1);
  }
  @keyframes popup-in {
    from { opacity:0; transform: scale(.92) translateY(6px); }
    to   { opacity:1; transform: scale(1)  translateY(0);    }
  }
  #popup .close-btn {
    position: absolute; top: 10px; right: 12px;
    background: none; border: none; cursor: pointer;
    color: var(--ink3); font-size: 1.1rem; line-height: 1;
    transition: color .15s;
  }
  #popup .close-btn:hover { color: var(--gold); }
  #popup .pop-ornament {
    display: block; text-align: center;
    font-size: .7rem; letter-spacing: .25em; color: var(--gold);
    margin-bottom: 8px; opacity: .7;
  }
  #popup .pop-cluster-badge {
    display: inline-block;
    font-size: .65rem; letter-spacing: .1em;
    padding: 2px 8px; border-radius: 20px;
    margin-bottom: 8px; font-style: italic; border: 1px solid; opacity: .85;
  }
  #popup .pop-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem; font-weight: 700; color: var(--gold2);
    line-height: 1.3; margin-bottom: 4px;
  }
  #popup .pop-author {
    font-size: .8rem; color: var(--ink3); font-style: italic;
    margin-bottom: 10px; letter-spacing: .03em;
  }
  #popup .pop-divider {
    border: none; border-top: 1px solid rgba(201,169,75,.25); margin: 8px 0;
  }
  #popup .pop-blurb {
    font-size: .78rem; color: var(--ink2); line-height: 1.55;
    max-height: 80px; overflow: hidden;
    word-break: break-word; overflow-wrap: break-word;
    transition: max-height .4s ease;
  }
  #popup .pop-blurb.expanded { max-height: 220px; overflow-y: auto; }
  #popup .pop-blurb.expanded::-webkit-scrollbar { width: 4px; }
  #popup .pop-blurb.expanded::-webkit-scrollbar-thumb { background: var(--panel2); border-radius: 4px; }
  #popup .expand-btn {
    background: none; border: none; cursor: pointer;
    font-size: .72rem; color: var(--gold); font-style: italic;
    padding: 3px 0; display: block; margin-top: 4px;
    transition: color .15s;
  }
  #popup .expand-btn:hover { color: var(--gold2); }
  #popup .pop-cta {
    display: block; width: 100%; margin-top: 14px;
    padding: 9px 0; text-align: center;
    background: linear-gradient(135deg, #7a5520, #c9a94b);
    color: #1a1005; font-family: 'Playfair Display', serif;
    font-size: .82rem; font-weight: 700; letter-spacing: .07em;
    text-decoration: none; border-radius: 7px;
    box-shadow: 0 2px 10px rgba(201,169,75,.25);
    transition: filter .15s, transform .12s;
  }
  #popup .pop-cta:hover { filter: brightness(1.12); transform: translateY(-1px); }

  /* ── Legend ── */
  #legend {
    position: fixed; bottom: 18px; right: 18px; z-index: 100;
    background: rgba(30,21,9,.88);
    border: 1px solid rgba(201,169,75,.3);
    border-radius: 10px; padding: 12px 16px;
    font-size: .72rem; color: var(--ink3);
    backdrop-filter: blur(4px);
    max-width: 200px; max-height: 60vh; overflow-y: auto;
  }
  #legend::-webkit-scrollbar { width: 3px; }
  #legend::-webkit-scrollbar-thumb { background: var(--panel2); border-radius: 3px; }
  #legend h3 {
    font-family: 'Playfair Display', serif; font-size: .78rem;
    color: var(--gold); margin-bottom: 8px; letter-spacing: .06em;
  }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; line-height: 1.3; cursor: pointer; }
  .legend-item:hover .legend-label { color: var(--gold2); }
  .legend-hex { width: 14px; height: 14px; flex-shrink: 0; }
  .legend-label { font-size: .68rem; color: var(--ink2); }

  /* ── Zoom controls ── */
  #zoom-controls {
    position: fixed; bottom: 18px; left: 18px; z-index: 100;
    display: flex; flex-direction: column; gap: 6px;
  }
  .zoom-btn {
    width: 34px; height: 34px; border-radius: 8px;
    background: rgba(30,21,9,.9); border: 1px solid rgba(201,169,75,.35);
    color: var(--gold); font-size: 1.2rem; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background .15s, border-color .15s;
  }
  .zoom-btn:hover { background: var(--panel2); border-color: var(--gold); }

  /* ── Meta bar (bottom center) ── */
  #meta-bar {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    z-index: 100; font-size: .72rem; color: var(--ink3); font-style: italic;
    pointer-events: none;
  }

  /* ── Error banner ── */
  #error-banner {
    position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    z-index: 300; background: #5a1a1a; border: 1px solid #c44;
    border-radius: 8px; padding: 10px 18px;
    font-size: .82rem; color: #f8b0b0; display: none;
    max-width: 480px; text-align: center;
  }

  /* ── Return button ── */
  #return-btn {
    position: fixed; top: 14px; left: 18px; z-index: 150;
    background: rgba(30,21,9,.9); border: 1px solid rgba(201,169,75,.35);
    color: var(--gold); font-family: 'Playfair Display', serif;
    font-size: .78rem; letter-spacing: .06em;
    padding: 7px 14px; border-radius: 8px; text-decoration: none;
    cursor: pointer; pointer-events: auto;
    transition: background .15s, border-color .15s;
  }
  #return-btn:hover { background: var(--panel2); border-color: var(--gold); }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="load-title">Carte sémantique</div>
  <div class="load-sub" id="load-status">Chargement de la carte…</div>
</div>

<div id="header">
  <div id="header-center">
    <h1>✦ Carte sémantique</h1>
    <p>Cartographie sémantique de la bibliothèque</p>
  </div>
</div>
<a id="return-btn" href="index.html">← Retour</a>
<div id="bookcount"></div>

<canvas id="map-canvas"></canvas>

<div id="popup">
  <button class="close-btn" onclick="forceClosePopup()">✕</button>
  <span class="pop-ornament">— — ✦ — —</span>
  <span class="pop-cluster-badge" id="pop-cluster-badge"></span>
  <div class="pop-title"  id="pop-title"></div>
  <div class="pop-author" id="pop-author"></div>
  <hr class="pop-divider"/>
  <div class="pop-blurb"  id="pop-blurb"></div>
  <button class="expand-btn" id="expand-btn" onclick="toggleBlurb()">Lire plus ▾</button>
  <a class="pop-cta" id="pop-cta" href="#" target="_blank">Page du livre →</a>
</div>

<div id="legend">
  <h3>Clusters</h3>
  <div id="legend-items"></div>
</div>

<div id="zoom-controls">
  <button class="zoom-btn" onclick="adjustZoom(1.25)">+</button>
  <button class="zoom-btn" onclick="adjustZoom(0.8)">−</button>
</div>

<div id="meta-bar" id="meta-bar"></div>
<div id="error-banner"></div>

<script>
// ─────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────
const BASE     = 'https://pub-e40dd4d214674632a4c513ef3797acfe.r2.dev';
const MAP_URL  = `${BASE}/map.json`;

// ─────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────
let books     = [];   // enriched book objects for rendering
let clusters  = [];   // {id, label, color, centroid_x, centroid_y, size}
let transform = { x: 0, y: 0, scale: 1 };
let dragging  = false, dragStart = {x:0,y:0}, transformStart = {x:0,y:0};
let activeBook = null;
let pinned     = false;
let HEX_R      = 32;

const canvas = document.getElementById('map-canvas');
const ctx    = canvas.getContext('2d');

// ─────────────────────────────────────────────────────
// UI HELPERS
// ─────────────────────────────────────────────────────
function setStatus(msg) { document.getElementById('load-status').textContent = msg; }
function showError(msg) {
  const b = document.getElementById('error-banner');
  b.style.display = 'block'; b.textContent = msg;
}

// ─────────────────────────────────────────────────────
// HEXAGONAL LAYOUT
// ─────────────────────────────────────────────────────
function layoutHoneycomb(coords, hexR) {
  const HEX_W = hexR * 2;
  const HEX_H = Math.sqrt(3) * hexR;
  const occupied = new Map();
  const hexKey    = (q, r) => `${q},${r}`;
  const hexCenter = (q, r) => [HEX_W * (q + 0.5 * r), HEX_H * r];
  const nearestHex = (cx, cy) => {
    const r = Math.round(cy / HEX_H);
    return [Math.round(cx / HEX_W - 0.5 * r), r];
  };
  function spiralNeighbors(q, r, maxRing = 80) {
    const result = [[q, r]];
    const dirs = [[-1,1],[0,-1],[-1,0],[1,-1],[0,1],[1,0]];
    for (let ring = 1; ring < maxRing; ring++) {
      let cq = q + ring, cr = r;
      for (const [dq, dr] of dirs)
        for (let s = 0; s < ring; s++) { result.push([cq, cr]); cq += dq; cr += dr; }
    }
    return result;
  }
  return coords.map(([cx, cy]) => {
    const [bq, br] = nearestHex(cx, cy);
    for (const [q, r] of spiralNeighbors(bq, br)) {
      const k = hexKey(q, r);
      if (!occupied.has(k)) { occupied.set(k, true); return hexCenter(q, r); }
    }
    return [cx, cy];
  });
}

// ─────────────────────────────────────────────────────
// DRAW
// ─────────────────────────────────────────────────────
function hexPath(cx, cy, r) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 180 * (60 * i - 30);
    const x = cx + r * Math.cos(a), y = cy + r * Math.sin(a);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
}

function worldToScreen(wx, wy) { return [wx * transform.scale + transform.x, wy * transform.scale + transform.y]; }
function screenToWorld(sx, sy) { return [(sx - transform.x) / transform.scale, (sy - transform.y) / transform.scale]; }

function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#2a1f14';
  ctx.fillRect(0, 0, W, H);
  ctx.save();
  ctx.translate(transform.x, transform.y);
  ctx.scale(transform.scale, transform.scale);

  // Subtle grid
  ctx.strokeStyle = 'rgba(201,169,75,0.04)';
  ctx.lineWidth = 1 / transform.scale;
  const gS = 120;
  const x0 = Math.floor(-transform.x / (transform.scale * gS) - 1) * gS;
  const x1 = (W - transform.x) / transform.scale + gS;
  const y0 = Math.floor(-transform.y / (transform.scale * gS) - 1) * gS;
  const y1 = (H - transform.y) / transform.scale + gS;
  for (let x = x0; x < x1; x += gS) { ctx.beginPath(); ctx.moveTo(x,-5000); ctx.lineTo(x,5000); ctx.stroke(); }
  for (let y = y0; y < y1; y += gS) { ctx.beginPath(); ctx.moveTo(-5000,y); ctx.lineTo(5000,y); ctx.stroke(); }

  if (!books.length) { ctx.restore(); return; }

  const innerR = HEX_R * 0.84;
  const glowR  = HEX_R * 1.5;

  // Draw books
  for (const b of books) {
    const wx = b.layoutX, wy = b.layoutY;
    const isActive = activeBook && activeBook === b;
    const fill   = b.color;
    const stroke = lighten(b.color, 0.25);

    if (isActive) {
      ctx.save();
      const grad = ctx.createRadialGradient(wx, wy, 0, wx, wy, glowR);
      grad.addColorStop(0, 'rgba(201,169,75,0.35)');
      grad.addColorStop(1, 'rgba(201,169,75,0)');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(wx, wy, glowR, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    // Shadow
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.55)';
    ctx.shadowBlur  = 12 / transform.scale;
    ctx.shadowOffsetY = 3 / transform.scale;
    hexPath(wx, wy, innerR);
    ctx.fillStyle = isActive ? '#1a1005' : '#1e1408';
    ctx.fill();
    ctx.restore();

    // Colour fill
    hexPath(wx, wy, innerR);
    const g2 = ctx.createRadialGradient(wx - innerR*.2, wy - innerR*.2, 0, wx, wy, innerR*1.3);
    g2.addColorStop(0, fill + 'dd');
    g2.addColorStop(0.7, fill + '99');
    g2.addColorStop(1, fill + '55');
    ctx.fillStyle = g2; ctx.fill();

    // Border
    hexPath(wx, wy, innerR);
    ctx.strokeStyle = isActive ? '#f0d090' : stroke + 'cc';
    ctx.lineWidth = (isActive ? 2.5 : 1.5) / transform.scale;
    ctx.stroke();

    // Inner shine
    hexPath(wx, wy, innerR * 0.66);
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 0.8 / transform.scale; ctx.stroke();

    // Centre dot
    ctx.beginPath(); ctx.arc(wx, wy, 3.5 / transform.scale, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.fill();
  }

  // Cluster labels (drawn over hexes)
  ctx.save();
  const labelScale = Math.max(0.6, Math.min(1.2, transform.scale));
  for (const cl of clusters) {
    const [sx, sy] = [cl.cx, cl.cy]; // already in world coords
    ctx.font = `italic ${Math.round(11 / transform.scale)}px 'Playfair Display', serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const alpha = Math.min(1, Math.max(0, (transform.scale - 0.25) / 0.5));
    ctx.fillStyle = `rgba(232,200,112,${alpha * 0.65})`;
    ctx.fillText(cl.label, sx, sy - HEX_R * 2.2 / transform.scale);
  }
  ctx.restore();

  ctx.restore();
}

// naive colour lightening for stroke
function lighten(hex, amount) {
  const n = parseInt(hex.slice(1), 16);
  let r = (n >> 16) & 0xff, g = (n >> 8) & 0xff, b = n & 0xff;
  r = Math.min(255, r + Math.round(255 * amount));
  g = Math.min(255, g + Math.round(255 * amount));
  b = Math.min(255, b + Math.round(255 * amount));
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

// ─────────────────────────────────────────────────────
// HIT TEST
// ─────────────────────────────────────────────────────
function hitTest(sx, sy) {
  const [wx, wy] = screenToWorld(sx, sy);
  const r = HEX_R * 0.84;
  let best = null, bestD = Infinity;
  for (const b of books) {
    const d = Math.hypot(b.layoutX - wx, b.layoutY - wy);
    if (d < r && d < bestD) { bestD = d; best = b; }
  }
  return best;
}

// Convert folder stem to readable title: underscores/hyphens → spaces, title-case
function folderToTitle(stem) {
  return stem.replace(/[_-]+/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

// ─────────────────────────────────────────────────────
// POPUP
// ─────────────────────────────────────────────────────
let blurbExpanded = false;

function showPopup(book, sx, sy) {
  activeBook = book; blurbExpanded = false;
  document.getElementById('pop-title').textContent  = book.title || folderToTitle(book.name);
  document.getElementById('pop-author').textContent = book.author ? `— ${book.author}` : '';

  const badge = document.getElementById('pop-cluster-badge');
  badge.textContent = book.cluster_label || `Cluster ${book.cluster_id}`;
  badge.style.color       = book.color;
  badge.style.borderColor = book.color + '88';
  badge.style.background  = book.color + '1a';

  const blurbEl = document.getElementById('pop-blurb');
  blurbEl.textContent = book.summary || 'Aucun résumé disponible.';
  blurbEl.classList.remove('expanded');
  document.getElementById('expand-btn').textContent = 'Lire plus ▾';
  document.getElementById('expand-btn').style.display = (book.summary || '').length > 160 ? 'block' : 'none';

  document.getElementById('pop-cta').href = `livre.html?id=${book.name}`;

  const popup = document.getElementById('popup');
  popup.style.display = 'block';
  const W = window.innerWidth, H = window.innerHeight;
  const popW = 320, popH = 300;
  let left = sx + 18, top = sy - 30;
  if (left + popW > W - 10) left = sx - popW - 18;
  if (top + popH > H - 10) top = H - popH - 10;
  if (top < 60) top = 60;
  popup.style.left = left + 'px'; popup.style.top = top + 'px';
  draw();
}

function closePopup() {
  if (pinned) return;
  document.getElementById('popup').style.display = 'none';
  activeBook = null; draw();
}
function forceClosePopup() {
  pinned = false; activeBook = null;
  document.getElementById('popup').style.display = 'none'; draw();
}
function toggleBlurb() {
  blurbExpanded = !blurbExpanded;
  document.getElementById('pop-blurb').classList.toggle('expanded', blurbExpanded);
  document.getElementById('expand-btn').textContent = blurbExpanded ? 'Réduire ▴' : 'Lire plus ▾';
}

// ─────────────────────────────────────────────────────
// LEGEND
// ─────────────────────────────────────────────────────
function hexPointsSvg(cx, cy, r) {
  return Array.from({length:6}, (_,i) => {
    const a = Math.PI / 180 * (60 * i - 30);
    return `${cx + r*Math.cos(a)},${cy + r*Math.sin(a)}`;
  }).join(' ');
}

function buildLegend() {
  const container = document.getElementById('legend-items');
  container.innerHTML = '';
  const sorted = [...clusters].sort((a, b) => b.size - a.size);
  for (const cl of sorted) {
    const div = document.createElement('div');
    div.className = 'legend-item';
    div.innerHTML =
      `<svg class="legend-hex" viewBox="-1 -1 2 2" xmlns="http://www.w3.org/2000/svg">
         <polygon points="${hexPointsSvg(0,0,0.9)}" fill="${cl.color}" stroke="${lighten(cl.color,0.25)}" stroke-width="0.12"/>
       </svg>
       <span class="legend-label">${cl.label} <span style="opacity:.5">(${cl.size})</span></span>`;
    div.addEventListener('click', () => focusCluster(cl.id));
    container.appendChild(div);
  }
}

// ─────────────────────────────────────────────────────
// FIT / FOCUS
// ─────────────────────────────────────────────────────
function fitView() {
  if (!books.length) return;
  let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
  for (const b of books) {
    minX=Math.min(minX,b.layoutX); maxX=Math.max(maxX,b.layoutX);
    minY=Math.min(minY,b.layoutY); maxY=Math.max(maxY,b.layoutY);
  }
  const W=canvas.width, H=canvas.height, pad=120;
  const sX=(W-pad*2)/(maxX-minX||1), sY=(H-pad*2)/(maxY-minY||1);
  transform.scale = Math.min(sX, sY, 2);
  transform.x = W/2 - ((minX+maxX)/2) * transform.scale;
  transform.y = H/2 - ((minY+maxY)/2) * transform.scale;
}

function focusCluster(clusterId) {
  const members = books.filter(b => b.cluster_id === clusterId);
  if (!members.length) return;
  let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
  for (const b of members) {
    minX=Math.min(minX,b.layoutX); maxX=Math.max(maxX,b.layoutX);
    minY=Math.min(minY,b.layoutY); maxY=Math.max(maxY,b.layoutY);
  }
  const W=canvas.width, H=canvas.height, pad=160;
  const sX=(W-pad*2)/(maxX-minX||1), sY=(H-pad*2)/(maxY-minY||1);
  transform.scale = Math.min(sX, sY, 3);
  transform.x = W/2 - ((minX+maxX)/2) * transform.scale;
  transform.y = H/2 - ((minY+maxY)/2) * transform.scale;
  draw();
}

// ─────────────────────────────────────────────────────
// INTERACTION
// ─────────────────────────────────────────────────────
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; draw(); }

canvas.addEventListener('mousemove', e => {
  if (dragging) {
    transform.x = transformStart.x + (e.clientX - dragStart.x);
    transform.y = transformStart.y + (e.clientY - dragStart.y);
    draw(); return;
  }
  if (pinned) return;
  const b = hitTest(e.clientX, e.clientY);
  if (b) showPopup(b, e.clientX, e.clientY); else closePopup();
});

canvas.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  const b = hitTest(e.clientX, e.clientY);
  if (b) {
    if (pinned && activeBook === b) { pinned = false; closePopup(); }
    else { pinned = true; showPopup(b, e.clientX, e.clientY); }
    return;
  }
  pinned = false; closePopup();
  dragging = true;
  dragStart = {x: e.clientX, y: e.clientY};
  transformStart = {x: transform.x, y: transform.y};
  document.body.classList.add('grabbing');
});

canvas.addEventListener('mouseup',    () => { dragging = false; document.body.classList.remove('grabbing'); });
canvas.addEventListener('mouseleave', () => { dragging = false; document.body.classList.remove('grabbing'); if (!pinned) closePopup(); });

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.88 : 1.12;
  transform.x = e.clientX - (e.clientX - transform.x) * factor;
  transform.y = e.clientY - (e.clientY - transform.y) * factor;
  transform.scale = Math.max(0.12, Math.min(8, transform.scale * factor));
  draw();
}, {passive: false});

let lastTouchDist = 0;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    const b = hitTest(t.clientX, t.clientY);
    if (b) { showPopup(b, t.clientX, t.clientY); return; }
    dragging = true;
    dragStart = {x: t.clientX, y: t.clientY};
    transformStart = {x: transform.x, y: transform.y};
    closePopup();
  } else if (e.touches.length === 2) {
    dragging = false;
    lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }
}, {passive: true});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    const t = e.touches[0];
    transform.x = transformStart.x + (t.clientX - dragStart.x);
    transform.y = transformStart.y + (t.clientY - dragStart.y);
  } else if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    const factor = d / lastTouchDist; lastTouchDist = d;
    const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const my = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    transform.x = mx - (mx - transform.x) * factor;
    transform.y = my - (my - transform.y) * factor;
    transform.scale = Math.max(0.12, Math.min(8, transform.scale * factor));
  }
  draw();
}, {passive: false});

canvas.addEventListener('touchend', () => { dragging = false; });

function adjustZoom(factor) {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  transform.x = cx - (cx - transform.x) * factor;
  transform.y = cy - (cy - transform.y) * factor;
  transform.scale = Math.max(0.12, Math.min(8, transform.scale * factor));
  draw();
}

// ─────────────────────────────────────────────────────
// MAIN — load map.json and render
// ─────────────────────────────────────────────────────
async function main() {
  resize();
  window.addEventListener('resize', resize);

  setStatus('Chargement de map.json…');

  let mapData;
  try {
    const resp = await fetch(MAP_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    mapData = await resp.json();
  } catch (err) {
    showError(`Impossible de charger map.json : ${err.message}`);
    document.getElementById('loading').classList.add('hidden');
    return;
  }

  // ── Validate ──────────────────────────────────────
  if (!mapData.books || !mapData.books.length) {
    showError('map.json ne contient aucun livre.');
    document.getElementById('loading').classList.add('hidden');
    return;
  }

  clusters = mapData.clusters || [];

  setStatus('Mise en page hexagonale…');

  // map.json coordinates are in [-1, 1]; scale to world pixels
  const rawBooks = mapData.books;
  const n = rawBooks.length;
  const worldSize = Math.max(600, n * 40);

  // Scale normalised [-1,1] coords to world space
  const coords = rawBooks.map(b => [b.x * worldSize / 2, b.y * worldSize / 2]);

  // Hex layout to avoid overlaps
  HEX_R = Math.max(26, Math.min(50, 300 / Math.sqrt(n)));
  const positions = layoutHoneycomb(coords, HEX_R * 1.15);

  // Fetch title, author, summary from metadata.json (silent failures)
  setStatus(`Chargement des métadonnées (${n} livres)…`);
  const metaMap = {};
  await Promise.allSettled(
    rawBooks.map(async b => {
      try {
        const r = await fetch(`${BASE}/${b.name}/metadata.json`, {signal: AbortSignal.timeout(8000)});
        if (r.ok) {
          const meta = await r.json();
          // summary is sometimes double-encoded: "\"text\"" — unwrap one level
          let summary = meta.summary || '';
          try { summary = JSON.parse(summary); } catch {}
          summary = summary.replace(/^["\s]+|["\s]+$/g, '').trim();
          metaMap[b.name] = {
            title:  meta.title  || folderToTitle(b.name),
            author: meta.author || '',
            summary,
          };
        }
      } catch { /* silent */ }
    })
  );

  // Build enriched book objects
  books = rawBooks.map((b, i) => {
    const m = metaMap[b.name] || {};
    return {
      ...b,
      layoutX: positions[i][0],
      layoutY: positions[i][1],
      title:   m.title   || folderToTitle(b.name),
      author:  m.author  || '',
      summary: m.summary || '',
    };
  });

  // Compute cluster centroids in layout space (for label drawing)
  const clusterMap = new Map(clusters.map(cl => [cl.id, cl]));
  for (const cl of clusters) {
    const members = books.filter(b => b.cluster_id === cl.id);
    if (members.length) {
      cl.cx = members.reduce((s, b) => s + b.layoutX, 0) / members.length;
      cl.cy = members.reduce((s, b) => s + b.layoutY, 0) / members.length;
    } else {
      // fallback: use map.json centroid
      cl.cx = cl.centroid_x * worldSize / 2;
      cl.cy = cl.centroid_y * worldSize / 2;
    }
  }

  // ── Render ────────────────────────────────────────
  document.getElementById('bookcount').textContent = `${n} livre${n > 1 ? 's' : ''}`;
  document.getElementById('meta-bar').textContent =
    `${n} livres · ${clusters.length} clusters · généré le ${new Date(mapData.generated_at).toLocaleDateString('fr-FR')}`;

  buildLegend();
  fitView();
  draw();

  document.getElementById('loading').classList.add('hidden');
}

window.addEventListener('load', main);
</script>
